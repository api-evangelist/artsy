apis:
  - aid: artsy:artsy-api
    name: Artsy Public API
    description: >-
      The Artsy Public API provides access to images of historic artwork and
      related information on artsy.net for educational and non-commercial
      purposes. Resources include artists, artworks, editions, fairs, genes
      (art classification taxonomy), images, shows, collections, partners,
      profiles, search, sales, bids, and bidder positions.
    humanURL: https://developers.artsy.net/
    baseURL: https://api.artsy.net/api
    tags:
      - Art
      - Artists
      - Artwork
      - Galleries
      - Search
    properties:
