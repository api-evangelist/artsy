  - type: Features
    data:
      - name: Artist and Artwork Data
        description: >-
          Comprehensive database of artist biographies, artwork metadata,
          images, dimensions, medium, and provenance for over 1 million artworks.
      - name: Gallery and Show Data
        description: >-
          Access to gallery profiles, exhibition shows, art fairs, and
          partner information from Artsy's global gallery network.
      - name: Art Classification Genes
        description: >-
          Artsy's proprietary gene taxonomy for classifying artworks by style,
          period, subject matter, and medium, enabling sophisticated art
          discovery and recommendation.
      - name: Auction and Sales Data
        description: >-
          Sale, bidder, and bid information for auction and buy-now listings
          on the Artsy platform.
      - name: Full-Text Search
        description: >-
          Search across artists, artworks, galleries, and other art world
          entities with faceted filtering and relevance ranking.
  - type: UseCases
    data:
      - name: Art Education Applications
        description: >-
          Educational platforms use the Artsy API to access public domain
          artwork images and artist information for art history curriculum
          and museum education tools.
      - name: Gallery Integration
        description: >-
          Partner galleries integrate with the Artsy Partner API to manage
          artwork listings, track collector inquiries, and access sales analytics.
      - name: Art Discovery Tools
        description: >-
          Developers build art recommendation and discovery applications using
          Artsy's gene taxonomy and artist relationship data.
      - name: Research and Analysis
        description: >-
          Art market researchers access Artsy data to analyze trends, auction
          results, and artist career trajectories.
  - type: Integrations
    data:
      - name: Artsy Partner Program
        description: >-
          Gallery and auction house partners integrate directly with Artsy
          through the Partner API for full marketplace integration including
          artwork listings and collector communications.
