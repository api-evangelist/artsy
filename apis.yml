aid: artsy
name: Artsy
description: >-
  Artsy is the world's largest online art marketplace, connecting collectors
  with artists and galleries worldwide. The platform features over 1 million
  artworks from 100,000+ artists and provides access to galleries, art fairs,
  and auction houses globally. Artsy offers a Public API providing access to
  images of historic artwork and related information for educational and
  non-commercial purposes, with access limited to public domain works. The
  API provides resources for artists, artworks, galleries, shows, sales, and
  gene (classification) data. Note that the public API may be retired; partner
  integrations are handled through a separate partner API program.
