aid: artsy
name: Artsy
description: >-
  Artsy is the world's largest online art marketplace, connecting collectors
  with artists and galleries. The Artsy Public API provides access to images of
  historic artwork and related information on artsy.net for educational and
  other non-commercial purposes, with current access limited to public domain
  works.
